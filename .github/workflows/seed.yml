name: Seed Backfill

# Manually-triggered backfill. Generates posts from the curated evergreen topic
# list (scripts/seed-topics.ts) using the same write path as the hourly job, then
# commits them. Runs in CI so it uses the repo's existing Actions secrets — the
# rotated keys never leave GitHub. Trigger it from the Actions tab → "Run workflow".
on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max topics to generate this run (0 = every not-yet-covered topic). Start small.'
        required: false
        default: '10'
      interval_hours:
        description: 'Hours to space published post dates apart (builds a back-dated catalog).'
        required: false
        default: '24'
      purge:
        description: 'DESTRUCTIVE: delete inherited posts first (keeps welcome-to-the-dispatch.mdx) and reset the topic log.'
        type: boolean
        required: false
        default: false

concurrency:
  group: seed-backfill
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Verify required secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          missing=0
          if [ -z "${GROQ_API_KEY}" ]; then
            echo "::error::GROQ_API_KEY is not set. Add it in Settings → Secrets and variables → Actions." >&2
            missing=1
          fi
          if [ -z "${BRAVE_API_KEY}" ]; then
            echo "::error::BRAVE_API_KEY secret is not set — seed topics have no source URL and require Brave web search." >&2
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Purge inherited posts (optional)
        if: ${{ inputs.purge }}
        run: |
          find content/posts -name '*.mdx' ! -name 'welcome-to-the-dispatch.mdx' -delete
          echo '{ "topics": [] }' > content/.topic-log.json
          echo "Purged inherited posts and reset the topic log."

      - name: Run seed
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          LIMIT: ${{ inputs.limit }}
          INTERVAL_HOURS: ${{ inputs.interval_hours }}
          PURGED: ${{ inputs.purge }}
        run: |
          npx tsx scripts/seed.ts --limit="$LIMIT" --interval-hours="$INTERVAL_HOURS" --delay=2000

          if [ "$PURGED" = "true" ]; then
            new_posts=$(git status --porcelain -- content/posts \
              | grep -E '\.mdx$' | grep -vE '^.D' | wc -l | tr -d ' ' || true)
            if [ "${new_posts:-0}" -eq 0 ]; then
              echo "::error::purge was requested but the seed produced 0 new posts — refusing to commit a wiped catalog. Check that GROQ_API_KEY and BRAVE_API_KEY are set." >&2
              exit 1
            fi
            echo "Purge run wrote ${new_posts} new post(s); proceeding to commit."
          fi

      - name: Commit and push
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          PRODUCTION_BRANCH: main
        run: |
          git config user.name "trendblog-bot"
          git config user.email "bot@trendblog.dev"
          git config merge.topiclog.name "union topic log entries"
          git config merge.topiclog.driver "node scripts/merge-topic-log.mjs %O %A %B"

          git add content/
          if git diff --cached --quiet; then
            echo "No new posts generated — nothing to commit."
            exit 0
          fi

          count=$(git diff --cached --name-only --diff-filter=A -- 'content/posts/*.mdx' | wc -l | tr -d ' ')
          git commit -m "seed: backfill ${count} evergreen post(s)"

          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "Pushed on attempt ${attempt}."
              if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ] && [ "${branch}" = "${PRODUCTION_BRANCH}" ]; then
                curl -fsS -m 30 --retry 3 -X POST "${VERCEL_DEPLOY_HOOK_URL}" >/dev/null \
                  && echo "Vercel redeploy triggered." \
                  || echo "Vercel deploy hook failed (non-fatal)." >&2
              fi
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${branch}..."
            git fetch origin "${branch}"
            if ! git rebase "origin/${branch}"; then
              echo "Rebase did not complete cleanly; aborting this attempt." >&2
              git rebase --abort || true
            fi
          done

          echo "Failed to push after multiple attempts." >&2
          exit 1
